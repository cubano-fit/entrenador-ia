<!DOCTYPE html>
<html>
<head>
    <title>👑 Panel Admin - ENTRENADOR IA</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00a86b; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #00a86b; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .badge-active { background: #00a86b20; color: #00a86b; padding: 3px 10px; border-radius: 20px; }
        .badge-expired { background: #e74c3c20; color: #e74c3c; padding: 3px 10px; border-radius: 20px; }
        .stats-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .btn { background: #00a86b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 Panel de Administración</h1>
        
        <div class="stats-card">
            <h3>📊 Estadísticas de Acceso</h3>
            <button class="btn" onclick="cargarEstadisticas()">🔄 Actualizar</button>
            <div id="stats">Cargando...</div>
        </div>
        
        <div class="stats-card">
            <h3>📋 Usuarios</h3>
            <table id="tablaUsuarios">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Contraseña</th>
                        <th>Accesos totales</th>
                        <th>Último acceso</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <tr><td colspan="6">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const GITHUB_TOKEN = 'TU_TOKEN_AQUI';
        const OWNER = 'cubano-fit';
        const REPO = 'entrenador-ia';
        
        // ============================================
        // Cargar usuarios del JSON
        // ============================================
        async function cargarUsuarios() {
            const res = await fetch('usuarios.json?_=' + Date.now());
            return await res.json();
        }
        
        // ============================================
        // Cargar estadísticas de GitHub [citation:2][citation:3]
        // ============================================
        async function cargarEstadisticas() {
            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/estadisticas.json`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const data = await res.json();
                const estadisticas = JSON.parse(atob(data.content));
                
                // Mostrar estadísticas
                let totalAccesos = 0;
                let usuariosActivos = 0;
                
                Object.values(estadisticas).forEach(u => {
                    totalAccesos += u.accesos || 0;
                    if (u.ultimoAcceso) {
                        const dias = Math.floor((new Date() - new Date(u.ultimoAcceso)) / (1000*60*60*24));
                        if (dias < 7) usuariosActivos++;
                    }
                });
                
                document.getElementById('stats').innerHTML = `
                    <p>📌 Total accesos: <strong>${totalAccesos}</strong></p>
                    <p>👥 Usuarios activos (última semana): <strong>${usuariosActivos}</strong></p>
                `;
                
                return estadisticas;
            } catch (error) {
                console.error('Error:', error);
                return {};
            }
        }
        
        // ============================================
        // Mostrar tabla combinada
        // ============================================
        async function mostrarTabla() {
            const usuarios = await cargarUsuarios();
            const estadisticas = await cargarEstadisticas();
            
            let html = '';
            for (let [user, pass] of Object.entries(usuarios)) {
                const stats = estadisticas[user] || { accesos: 0, ultimoAcceso: null };
                const ultimo = stats.ultimoAcceso ? new Date(stats.ultimoAcceso).toLocaleString() : 'Nunca';
                
                // Determinar estado (puedes agregar expiración manual después)
                const estado = '<span class="badge-active">✅ Activo</span>';
                
                html += `<tr>
                    <td><strong>${user}</strong></td>
                    <td><code>${pass}</code></td>
                    <td>${stats.accesos}</td>
                    <td>${ultimo}</td>
                    <td>${estado}</td>
                    <td>
                        <button onclick="eliminarUsuario('${user}')">🗑️</button>
                    </td>
                </tr>`;
            }
            
            document.getElementById('tablaBody').innerHTML = html;
        }
        
        // ============================================
        // Eliminar usuario (requiere token) [citation:2]
        // ============================================
        async function eliminarUsuario(user) {
            if (!confirm(`¿Eliminar a ${user}?`)) return;
            
            // Leer JSON actual
            const res = await fetch('usuarios.json');
            const usuarios = await res.json();
            delete usuarios[user];
            
            // Mostrar instrucciones
            alert('❌ No se puede eliminar automáticamente por seguridad.\n\nCopia este JSON y actualiza manualmente usuarios.json:');
            console.log(JSON.stringify(usuarios, null, 2));
        }
        
        // Iniciar
        mostrarTabla();
    </script>
</body>
</html>
